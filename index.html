<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>HyperEmu</title>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;

            touch-action: none;

            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }
    </style>
</head>

<body>
    <canvas id="emulator_canvas"></canvas>
</body>

</html>
