[package]
name = "emu-gui"
version = "0.1.0"
edition = "2024"

[dependencies]
hyperemu = { git = "https://github.com/Robby-cell/hyperemu.git", branch = "main" }
armv7-encoder = { git = "https://github.com/Robby-cell/armv7-encoder.git" }
armv7-disassembler = { git = "https://github.com/Robby-cell/armv7-disassembler.git" }

eframe = { version = "0.34.2", features = ["persistence", "ron"] }
egui = "0.34.2"
rfd = "0.17.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2.121"
wasm-bindgen-futures = "0.4.71"
web-sys = { version = "0.3.98", features = [
    "Window",
    "Document",
    "HtmlCanvasElement",
] }
